<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Forms</title>
</head>
<body>
<div>
    <header>
      <h1>Forms</h1>
    </header>
    <main>
      <form>
        <label>Name:</label>
        <input type="text" placeholder="Ram"><br><br>
        <label>Email:</label>
        <input type="email" placeholder="abc@gmail.com"><br><br>
        <label>Password:</label>
        <input type="password" placeholder="ram@123"><br><br>
        <label>Phone NO:</label>
        <input type="number" placeholder="8765638327"><br><br>
        <label>Gender:</label>
        <input type="radio" name="gender" id="female">Female
        <input type="radio" name="gender" id="male">Male<br><br>
        <label>Qyalification</label>
        <input type="checkbox">10th
        <input type="checkbox">inter
        <input type="checkbox">Diploma
        <input type="checkbox">Degree<br><br>
        <label>D.O.B:</label>
        <input type="datetime-local">
      </form>
    </main>
    <footer>

    </footer>
</div>
</body>
</html>
